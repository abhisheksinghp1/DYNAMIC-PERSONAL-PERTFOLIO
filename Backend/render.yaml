services:
  - type: web
    name: portfolio-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_TLS
        value: true
      - key: SMTP_USER
        sync: false        # set manually in Render dashboard
      - key: SMTP_PASSWORD
        sync: false        # set manually in Render dashboard
      - key: OWNER_EMAIL
        sync: false        # set manually in Render dashboard
      - key: ADMIN_USERNAME
        sync: false        # set manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false        # set manually in Render dashboard
      - key: SECRET_KEY
        sync: false        # set manually in Render dashboard
